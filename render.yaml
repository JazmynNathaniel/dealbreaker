services:
  - type: web
    name: dealbreaker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dealbreaker-db
          property: connectionString

databases:
  - name: dealbreaker-db
    plan: free
    databaseName: dealbreaker
    user: dealbreaker

